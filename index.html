<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1115;
            color: #e8e9ec;
            padding: 24px 20px 60px;
            min-height: 100vh;
        }

        .top-bar {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .top-bar a {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            text-decoration: none;
            color: #aab;
            transition: opacity 0.2s;
        }

        .top-bar a:hover {
            opacity: 0.7;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #7d8290;
            margin-top: 6px;
            margin-bottom: 24px;
        }

        .panel {
            background: #1c1f26;
            border: 1px solid #2a2d34;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .panel-header h2 {
            font-size: 16px;
            color: #fff;
        }

        .panel-close {
            background: none;
            border: none;
            color: #7d8290;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            width: auto;
            line-height: 1;
        }

        .panel-close:hover {
            color: #fff;
            background: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #9aa0ac;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #12141a;
            border: 1px solid #333844;
            border-radius: 9px;
            font-size: 15px;
            font-family: inherit;
            color: #eee;
        }

        input[type="text"]::placeholder {
            color: #5c6270;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4f8cff;
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            background: #4f8cff;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #3f78e6;
        }

        button:active {
            background: #3468cc;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            /* No max-height or overflow here on purpose — the page just keeps
               growing/scrolling naturally as more tiles are added. */
        }

        .tile {
            position: relative;
            aspect-ratio: 1;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            border: none;
            transition: transform 0.12s ease;
        }

        .tile:active {
            transform: scale(0.96);
        }

        .tile-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tile-scrim {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.72) 0%, rgba(0, 0, 0, 0) 55%);
        }

        .tile-name {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            line-height: 1.25;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        }

        .tile-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
        }

        .tile-action-btn {
            width: 30px;
            height: 30px;
            padding: 0;
            border-radius: 50%;
            background: rgba(15, 17, 21, 0.55);
            backdrop-filter: blur(2px);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .tile-action-btn:hover {
            background: rgba(15, 17, 21, 0.8);
        }

        .tile-action-btn.delete:hover {
            background: rgba(204, 51, 51, 0.85);
        }

        .tile-add {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #181b21;
            border: 2px dashed #333844;
            color: #5c6270;
            font-size: 36px;
            font-weight: 300;
        }

        .tile-add:hover {
            border-color: #4f8cff;
            color: #4f8cff;
        }

        .sync-status {
            font-size: 12px;
            color: #7d8290;
            text-align: center;
            margin-bottom: 15px;
            min-height: 16px;
        }

        .sync-status.error {
            color: #ff6b6b;
        }

        .file-input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-input-wrap input[type="file"] {
            flex: 1;
            font-size: 13px;
            color: #9aa0ac;
        }

        .image-preview {
            max-width: 60px;
            max-height: 60px;
            border-radius: 6px;
            display: none;
            object-fit: cover;
        }

        .image-preview.active {
            display: block;
        }

        .remove-image-link {
            display: none;
            font-size: 12px;
            color: #ff6b6b;
            margin-top: 8px;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            padding: 30px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1c1f26;
            border: 1px solid #2a2d34;
            padding: 26px;
            border-radius: 14px;
            max-width: 90%;
            width: 420px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        .btn-cancel {
            background: #333844;
        }

        .btn-cancel:hover {
            background: #40465a;
        }

        @media (max-width: 600px) {
            body {
                padding: 18px 14px 50px;
            }

            h1 {
                font-size: 24px;
            }

            .panel {
                padding: 16px;
            }

            .links-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="#" id="toggleTokenLink" onclick="toggleSyncTokenSection(event)">Sync Token</a>
        <a href="https://kurgel-dashboard.netlify.app/" target="_blank">Dashboard</a>
    </div>

    <div class="container">
        <h1>Link Board</h1>
        <p class="page-subtitle">Tap a tile to open &middot; tap + to add a link or image</p>

        <div class="sync-status" id="syncStatus"></div>

        <div class="panel" id="syncTokenSection" style="display: none;">
            <div class="panel-header">
                <h2>Sync Token</h2>
                <button class="panel-close" onclick="hideSyncTokenSection()" aria-label="Close">&times;</button>
            </div>
            <div class="form-group">
                <label for="syncToken">Needed once per device to save changes</label>
                <input type="text" id="syncToken" placeholder="paste your sync token">
            </div>
            <button onclick="saveSyncToken()" id="saveTokenBtn">Save Token</button>
        </div>

        <div class="panel" id="addFormSection" style="display: none;">
            <div class="panel-header">
                <h2>Add to Board</h2>
                <button class="panel-close" onclick="hideAddForm()" aria-label="Close">&times;</button>
            </div>
            <div class="form-group">
                <label for="linkName">Name</label>
                <input type="text" id="linkName" placeholder="e.g., Gmail, GitHub, News">
            </div>
            <div class="form-group">
                <label for="linkUrl">Link URL (optional if adding an image)</label>
                <input type="text" id="linkUrl" placeholder="e.g., https://gmail.com">
            </div>
            <div class="form-group">
                <label for="linkImage">Image (optional if adding a URL)</label>
                <div class="file-input-wrap">
                    <input type="file" id="linkImage" accept="image/*">
                    <img class="image-preview" id="linkImagePreview">
                </div>
            </div>
            <button onclick="addLink()" id="addLinkBtn">Add</button>
        </div>

        <div class="links-grid" id="linksList"></div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" alt="">
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>Edit</h2>
            <div class="form-group">
                <label for="editName">Name</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label for="editUrl">Link URL (optional if there's an image)</label>
                <input type="text" id="editUrl">
            </div>
            <div class="form-group">
                <label for="editImage">Image (optional if there's a URL)</label>
                <div class="file-input-wrap">
                    <input type="file" id="editImage" accept="image/*">
                    <img class="image-preview" id="editImagePreview">
                </div>
                <a href="#" id="removeEditImageLink" class="remove-image-link" onclick="removeEditImage(event)">Remove image</a>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button onclick="saveEdit()" id="saveEditBtn">Save</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'linkBoard_links';
        const TOKEN_KEY = 'linkBoard_writeToken';
        const API_URL = '/api/links';
        let links = [];
        let editingIndex = null;
        let pendingAddImage = null;
        let pendingEditImage = null;
        let clearEditImage = false;

        const DEFAULT_LINKS = [
            { name: 'Product P&L Tracker', url: 'https://product-pl-tracker.netlify.app/' },
            { name: 'Time Allocation Board', url: 'https://time-allocation-board.netlify.app/' },
            { name: 'Family Dashboard', url: 'https://kurgel-dashboard.netlify.app/' },
            { name: 'Ecom Launchpad (THE ENGINE)', url: 'https://ecom-launchpad-mentor.netlify.app/' },
            { name: 'Product Test Engine', url: 'https://product-test-engine.netlify.app/' },
            { name: 'LIARE Store', url: 'https://tryliare.shop/' },
            { name: 'LIARE PDP', url: 'https://tryliare.shop/products/liare' },
            { name: 'Korean Hair Growth Serum PDP', url: 'https://tryliare.shop/products/korean-hair-growth-serum' }
        ];

        function setSyncStatus(text, isError) {
            const el = document.getElementById('syncStatus');
            el.textContent = text;
            el.classList.toggle('error', !!isError);
        }

        function normalizeUrl(u) {
            return u.replace(/\/+$/, '');
        }

        function mergeDefaults(list) {
            const merged = list.slice();
            DEFAULT_LINKS.forEach(d => {
                if (!merged.some(l => normalizeUrl(l.url) === normalizeUrl(d.url))) {
                    merged.push(d);
                }
            });
            return merged;
        }

        async function loadLinks() {
            // Show cached copy immediately (instant paint, works offline)
            const cached = localStorage.getItem(STORAGE_KEY);
            if (cached) {
                links = JSON.parse(cached);
                renderLinks();
            }

            setSyncStatus('Syncing…');
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                if (!res.ok) throw new Error('fetch failed: ' + res.status);
                const cloudLinks = await res.json();
                const merged = mergeDefaults(cloudLinks);
                links = merged;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
                renderLinks();
                setSyncStatus('Synced across devices');
                // Push merged defaults back up if the cloud copy was missing any
                if (merged.length !== cloudLinks.length) {
                    await persistLinks();
                }
            } catch (err) {
                links = mergeDefaults(links);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
                renderLinks();
                setSyncStatus('Offline — showing cached links (changes will sync when back online)', true);
            }
        }

        async function persistLinks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
            const token = localStorage.getItem(TOKEN_KEY) || '';
            if (!token) {
                setSyncStatus('Saved locally only — enter your Sync Token to save to the cloud', true);
                showSyncTokenSection();
                return false;
            }
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-link-board-token': token },
                    body: JSON.stringify(links)
                });
                if (res.status === 401) {
                    setSyncStatus('Saved locally only — Sync Token is wrong, check it', true);
                    showSyncTokenSection();
                    return false;
                }
                if (!res.ok) throw new Error('save failed: ' + res.status);
                setSyncStatus('Synced across devices');
                return true;
            } catch (err) {
                setSyncStatus('Saved locally — could not reach cloud (check connection)', true);
                return false;
            }
        }

        function resizeImage(file, maxDim, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onerror = reject;
                reader.onload = () => {
                    const img = new Image();
                    img.onerror = reject;
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > height && width > maxDim) {
                            height = Math.round(height * (maxDim / width));
                            width = maxDim;
                        } else if (height > maxDim) {
                            width = Math.round(width * (maxDim / height));
                            height = maxDim;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('linkImage').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) { pendingAddImage = null; return; }
            pendingAddImage = await resizeImage(file, 800, 0.8);
            const preview = document.getElementById('linkImagePreview');
            preview.src = pendingAddImage;
            preview.classList.add('active');
        });

        document.getElementById('editImage').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            pendingEditImage = await resizeImage(file, 800, 0.8);
            clearEditImage = false;
            document.getElementById('removeEditImageLink').style.display = 'inline';
            const preview = document.getElementById('editImagePreview');
            preview.src = pendingEditImage;
            preview.classList.add('active');
        });

        async function addLink() {
            const name = document.getElementById('linkName').value.trim();
            const url = document.getElementById('linkUrl').value.trim();

            if (!name || (!url && !pendingAddImage)) {
                alert('Please provide a name, and either a URL or an image');
                return;
            }

            const link = { name };
            if (url) link.url = url;
            if (pendingAddImage) link.image = pendingAddImage;

            const btn = document.getElementById('addLinkBtn');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            links.push(link);
            await persistLinks();
            renderLinks();

            document.getElementById('linkName').value = '';
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkImage').value = '';
            document.getElementById('linkImagePreview').classList.remove('active');
            pendingAddImage = null;

            btn.disabled = false;
            btn.textContent = 'Add';
            hideAddForm();
        }

        async function deleteLink(index) {
            if (confirm('Delete this link?')) {
                links.splice(index, 1);
                renderLinks();
                await persistLinks();
            }
        }

        function openEditModal(index) {
            editingIndex = index;
            pendingEditImage = null;
            clearEditImage = false;
            const link = links[index];
            document.getElementById('editName').value = link.name;
            document.getElementById('editUrl').value = link.url || '';
            document.getElementById('editImage').value = '';
            const preview = document.getElementById('editImagePreview');
            const removeLink = document.getElementById('removeEditImageLink');
            const img = safeImage(link.image);
            if (img) {
                preview.src = img;
                preview.classList.add('active');
                removeLink.style.display = 'inline';
            } else {
                preview.classList.remove('active');
                removeLink.style.display = 'none';
            }
            document.getElementById('editModal').classList.add('active');
        }

        function removeEditImage(e) {
            if (e) e.preventDefault();
            pendingEditImage = null;
            clearEditImage = true;
            document.getElementById('editImage').value = '';
            const preview = document.getElementById('editImagePreview');
            preview.classList.remove('active');
            document.getElementById('removeEditImageLink').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = null;
            pendingEditImage = null;
            clearEditImage = false;
        }

        async function saveEdit() {
            const name = document.getElementById('editName').value.trim();
            const url = document.getElementById('editUrl').value.trim();

            const existing = links[editingIndex];
            const willHaveImage = pendingEditImage || (!clearEditImage && existing.image);

            if (!name || (!url && !willHaveImage)) {
                alert('Please provide a name, and either a URL or an image');
                return;
            }

            const updated = { name };
            if (url) updated.url = url;
            if (pendingEditImage) updated.image = pendingEditImage;
            else if (!clearEditImage && existing.image) updated.image = existing.image;

            const btn = document.getElementById('saveEditBtn');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            links[editingIndex] = updated;
            await persistLinks();
            closeModal();
            renderLinks();

            btn.disabled = false;
            btn.textContent = 'Save';
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        // Chrome (and most Chromium browsers) blocks top-level navigation to
        // data: URLs as a phishing mitigation, so window.open(dataUrl) silently
        // fails for image-only tiles. Show it in an in-page lightbox instead —
        // works everywhere, no popup/navigation restrictions, and is a better
        // fit for a TV/remote-driven device anyway.
        function openImageLightbox(imgSrc) {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = imgSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Escape') return;
            closeLightbox();
            closeModal();
        });

        const SAFE_IMAGE_RE = /^data:image\/(png|jpe?g|gif|webp);base64,[A-Za-z0-9+/]+=*$/;

        function safeImage(image) {
            return typeof image === 'string' && SAFE_IMAGE_RE.test(image) ? image : null;
        }

        const TILE_GRADIENTS = [
            'linear-gradient(135deg,#ff5f6d,#ffc371)',
            'linear-gradient(135deg,#4facfe,#00f2fe)',
            'linear-gradient(135deg,#a18cd1,#fbc2eb)',
            'linear-gradient(135deg,#f6d365,#fda085)',
            'linear-gradient(135deg,#43e97b,#38f9d7)',
            'linear-gradient(135deg,#fa709a,#fee140)',
            'linear-gradient(135deg,#30cfd0,#7b2ff7)',
            'linear-gradient(135deg,#ff9a8b,#ff6a88)'
        ];

        // Deterministic (not random) so a tile's color stays stable across reloads/devices
        function tileGradient(seed) {
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = (hash * 31 + seed.charCodeAt(i)) | 0;
            }
            return TILE_GRADIENTS[Math.abs(hash) % TILE_GRADIENTS.length];
        }

        function renderLinks() {
            const container = document.getElementById('linksList');

            const tiles = links.map((link, index) => {
                const img = safeImage(link.image);
                const openTarget = link.url || '';
                const background = img ? `background:#181b21;` : `background:${tileGradient(link.name + (link.url || ''))};`;
                const onclick = openTarget
                    ? `openLink('${escapeHtml(openTarget)}')`
                    : (img ? `openImageLightbox('${escapeHtml(img)}')` : '');

                return `
                <div class="tile" style="${background}" ${onclick ? `onclick="${onclick}"` : ''} title="${escapeHtml(link.name)}">
                    ${img ? `<img class="tile-image" src="${escapeHtml(img)}" alt="${escapeHtml(link.name)}">` : ''}
                    <div class="tile-scrim"></div>
                    <div class="tile-name">${escapeHtml(link.name)}</div>
                    <div class="tile-actions">
                        <button class="tile-action-btn" onclick="event.stopPropagation(); openEditModal(${index})" aria-label="Edit" title="Edit">&#9998;</button>
                        <button class="tile-action-btn delete" onclick="event.stopPropagation(); deleteLink(${index})" aria-label="Delete" title="Delete">&#128465;</button>
                    </div>
                </div>
            `;
            }).join('');

            const addTile = `<div class="tile tile-add" onclick="showAddForm()" title="Add a link or image">+</div>`;

            container.innerHTML = tiles + addTile;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        const syncTokenInput = document.getElementById('syncToken');
        syncTokenInput.value = localStorage.getItem(TOKEN_KEY) || '';

        function showSyncTokenSection() {
            document.getElementById('syncTokenSection').style.display = 'block';
        }

        function hideSyncTokenSection() {
            document.getElementById('syncTokenSection').style.display = 'none';
        }

        function toggleSyncTokenSection(e) {
            if (e) e.preventDefault();
            const section = document.getElementById('syncTokenSection');
            if (section.style.display === 'none') showSyncTokenSection();
            else hideSyncTokenSection();
        }

        // Only show on first run (no token saved yet) — otherwise stay tucked away
        if (!localStorage.getItem(TOKEN_KEY)) showSyncTokenSection();

        function saveSyncToken() {
            const val = syncTokenInput.value.trim();
            if (val) localStorage.setItem(TOKEN_KEY, val);
            else localStorage.removeItem(TOKEN_KEY);

            const btn = document.getElementById('saveTokenBtn');
            const original = btn.textContent;
            btn.textContent = val ? 'Saved ✓' : 'Cleared';
            setTimeout(() => {
                btn.textContent = original;
                if (val) hideSyncTokenSection();
            }, 1200);

            if (val) setSyncStatus('Sync Token saved on this device');
        }

        syncTokenInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveSyncToken();
        });

        function showAddForm() {
            document.getElementById('addFormSection').style.display = 'block';
            document.getElementById('linkName').focus();
            document.getElementById('addFormSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function hideAddForm() {
            document.getElementById('addFormSection').style.display = 'none';
        }

        document.getElementById('linkName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('linkUrl').focus();
        });

        document.getElementById('linkUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addLink();
        });

        loadLinks();
    </script>
</body>
</html>
